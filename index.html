<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registration Form</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
    }

    .container {
      max-width: 560px;
      margin: 48px auto;
      background: #ffffff;
      padding: 24px;
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    h2 {
      margin-top: 0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    td {
      vertical-align: top;
      padding: 8px 6px;
    }

    input {
      width: 100%;
      padding: 10px;
      border: 1px solid #c9d2df;
      border-radius: 6px;
      font-size: 14px;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      background: #1f6feb;
      color: #fff;
      cursor: pointer;
    }

    #submitBtn.invalid-state {
      cursor: not-allowed;
    }

    .mainerror {
      display: block;
      margin-top: 4px;
      min-height: 16px;
      color: #d1242f;
      font-size: 12px;
    }

    .success-message {
      min-height: 16px;
      color: #1a7f37;
      font-size: 13px;
    }

    .success-box {
      display: none;
      margin-top: 14px;
      padding: 10px 12px;
      border: 1px solid #9ad1a8;
      background: #ecfdf3;
      border-radius: 6px;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .success-box.show {
      display: flex;
    }

    .close-success-btn {
      padding: 2px 8px;
      background: transparent;
      color: #1a7f37;
      border: 1px solid #9ad1a8;
      border-radius: 4px;
      font-size: 14px;
      line-height: 1.2;
    }
  </style>
</head>
<body>
  <main class="container">
    <h2>Registration Form</h2>

    <form id="registrationForm" novalidate>
      <table>
        <tr>
          <td><label for="name">Name:</label></td>
          <td>
            <input type="text" id="name" name="name" autocomplete="name">
            <span id="nameError" class="mainerror"></span>
          </td>
        </tr>

        <tr>
          <td><label for="email">Email:</label></td>
          <td>
            <input type="email" id="email" name="email" autocomplete="email">
            <span id="emailError" class="mainerror"></span>
          </td>
        </tr>

        <tr>
          <td><label for="password">Password:</label></td>
          <td>
            <input type="password" id="password" name="password" autocomplete="new-password">
            <span id="passwordError" class="mainerror"></span>
          </td>
        </tr>

        <tr>
          <td></td>
          <td>
            <button type="submit" id="submitBtn">Submit</button>
          </td>
        </tr>
      </table>
    </form>
    <div id="successBox" class="success-box" aria-live="polite">
      <span id="successMessage" class="success-message"></span>
      <button type="button" id="closeSuccessBtn" class="close-success-btn" aria-label="Close success message">x</button>
    </div>
  </main>
  <script>
    function initRegistrationForm() {
      const nameInput = document.getElementById("name");
      const emailInput = document.getElementById("email");
      const passwordInput = document.getElementById("password");
      const nameError = document.getElementById("nameError");
      const emailError = document.getElementById("emailError");
      const passwordError = document.getElementById("passwordError");
      const registrationForm = document.getElementById("registrationForm");
      const submitBtn = document.getElementById("submitBtn");
      const successBox = document.getElementById("successBox");
      const successMessage = document.getElementById("successMessage");
      const closeSuccessBtn = document.getElementById("closeSuccessBtn");

      if (
        !nameInput ||
        !emailInput ||
        !passwordInput ||
        !nameError ||
        !emailError ||
        !passwordError ||
        !registrationForm ||
        !submitBtn ||
        !successBox ||
        !successMessage ||
        !closeSuccessBtn
      ) {
        return;
      }

      const touched = { name: false, email: false, password: false };
      let submitted = false;

      function emailIsValid(value) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);
      }

      function getErrors() {
        const errors = { name: "", email: "", password: "" };
        const name = nameInput.value.trim();
        const email = emailInput.value.trim();
        const password = passwordInput.value;

        if (!name) {
          errors.name = "Name is required";
        }

        if (!email) {
          errors.email = "Email is required";
        } else if (!emailIsValid(email)) {
          errors.email = "Please enter a valid email address";
        }

        if (!password) {
          errors.password = "Password is required";
        } else if (password.length < 6) {
          errors.password = "Password must be at least 6 characters";
        }

        return errors;
      }

      function render() {
        const errors = getErrors();
        const showAll = submitted;

        nameError.textContent = showAll || touched.name ? errors.name : "";
        emailError.textContent = showAll || touched.email ? errors.email : "";
        passwordError.textContent = showAll || touched.password ? errors.password : "";

        const isValid = !errors.name && !errors.email && !errors.password;
        submitBtn.classList.toggle("invalid-state", !isValid);

        if (!isValid) {
          successMessage.textContent = "";
          successBox.classList.remove("show");
        }
        return isValid;
      }

      function touchField(fieldName) {
        touched[fieldName] = true;
        render();
      }

      nameInput.addEventListener("blur", function () {
        touchField("name");
      });
      emailInput.addEventListener("blur", function () {
        touchField("email");
      });
      passwordInput.addEventListener("blur", function () {
        touchField("password");
      });

      nameInput.addEventListener("input", render);
      emailInput.addEventListener("input", render);
      passwordInput.addEventListener("input", render);

      submitBtn.addEventListener("click", function () {
        submitted = true;
        render();
      });

      registrationForm.addEventListener("submit", function (event) {
        event.preventDefault();
        submitted = true;

        if (!render()) {
          return;
        }

        successMessage.textContent = "Registration successful!";
        successBox.classList.add("show");
        registrationForm.reset();
        submitted = false;
        touched.name = false;
        touched.email = false;
        touched.password = false;
        nameError.textContent = "";
        emailError.textContent = "";
        passwordError.textContent = "";
      });

      closeSuccessBtn.addEventListener("click", function () {
        successMessage.textContent = "";
        successBox.classList.remove("show");
      });

      render();
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", initRegistrationForm);
    } else {
      initRegistrationForm();
    }
  </script>
</body>
</html>
